name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  testes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Lint
        run: python -m flake8 . --max-line-length=100

      - name: Testes com cobertura
        run: python -m pytest --cov=. --cov-report=xml --cov-report=html --cov-fail-under=80

      - name: Publicar relatorio
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
